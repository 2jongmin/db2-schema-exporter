# ===================================
# DB2 DataSource 설정
# ===================================
db.driver=com.ibm.db2.jcc.DB2Driver
db.url=jdbc:db2://localhost:50000/SAMPLEDB
db.username=db2admin
db.password=password
db.schema=MYSCHEMA

# HikariCP 커넥션 풀 설정
db.pool.maximumPoolSize=10
db.pool.minimumIdle=2
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000

# ===================================
# 추출 대상 테이블 (비우면 전체 추출)
# ===================================
export.tables=

# ===================================
# 엑셀 출력 설정
# ===================================
excel.output.path=./output
excel.output.filename=DB2_Schema_Export
excel.include.date=true

# ===================================
# DDL 생성 옵션
# ===================================
ddl.include.primary.key=true
ddl.include.index=true
ddl.include.comment=true
ddl.tablespace=USERSPACE1
