# ===================================
# DB2 연결 설정
# ===================================
db.url=jdbc:db2://localhost:50000/SAMPLEDB
db.username=db2admin
db.password=password
db.schema=MYSCHEMA

# 특정 테이블만 추출 (콤마 구분, 비우면 전체 추출)
# db.tables=TB_USER,TB_BOARD,TB_COMMENT
db.tables=

# ===================================
# 엑셀 출력 설정
# ===================================
excel.output.path=./output
excel.output.filename=DB2_Schema_Export
# 날짜 자동 포함 여부 (true/false)
excel.include.date=true

# ===================================
# DDL 생성 옵션
# ===================================
ddl.include.primary.key=true
ddl.include.index=true
ddl.include.comment=true
ddl.tablespace=USERSPACE1
